<style>
  :root{ --noon1:#0F766E; --noon2:#10B981; --gold:#FBBF24; }
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:#94a3b8}

  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
  @keyframes growW{from{width:0}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes spin{to{transform:rotate(360deg)}}

  .fade-up{animation:fadeUp .35s cubic-bezier(.2,.7,.3,1) both}
  .scale-in{animation:scaleIn .2s ease both}
  .slide-in{animation:slideIn .28s cubic-bezier(.2,.7,.3,1) both}
  .bar-grow{animation:growW .8s cubic-bezier(.2,.7,.3,1)}

  .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;box-shadow:0 1px 2px rgba(15,23,42,.04);transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease}
  .card-hover:hover{transform:translateY(-3px);box-shadow:0 14px 30px -12px rgba(15,118,110,.28);border-color:#99f6e4}
  .lift:hover{transform:translateY(-1px)}
  .nav-btn{transition:background .15s ease, color .15s ease, transform .1s ease}
  .nav-btn:active{transform:scale(.98)}
  .nav-active{background:linear-gradient(90deg, rgba(16,185,129,.22), rgba(16,185,129,.06));color:#fff;box-shadow:inset 3px 0 0 var(--noon2)}
  .btn-grad{background:linear-gradient(135deg,var(--noon1),var(--noon2));transition:filter .15s ease, transform .1s ease, box-shadow .15s ease;box-shadow:0 6px 16px -6px rgba(16,185,129,.6)}
  .btn-grad:hover{filter:brightness(1.07);transform:translateY(-1px)}
  .btn-grad:active{transform:translateY(0)}
  .row-hover{transition:background .12s ease}
  .chip{transition:all .14s ease}
  .grad-text{background:linear-gradient(135deg,var(--noon1),var(--noon2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .spinner{width:34px;height:34px;border:3px solid #d1fae5;border-top-color:var(--noon1);border-radius:50%;animation:spin .8s linear infinite}
  .glass{backdrop-filter:blur(8px);background:rgba(255,255,255,.85)}
  [data-tip]{position:relative}
</style>
</head>

<script type="text/babel" data-presets="react">

/* ----------------------------- Helpers ----------------------------- */
const eur = (n, cur="EUR") => new Intl.NumberFormat("de-DE",{style:"currency",currency:cur,maximumFractionDigits:0}).format(Number(n||0));
const fdate = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";
const cls = (...a) => a.filter(Boolean).join(" ");
const initials = (s="") => (s||"").split(" ").map(x=>x[0]).slice(0,2).join("").toUpperCase();
const daysUntil = d => d ? Math.ceil((new Date(d)-new Date())/86400000) : null;

const TYPE_LABEL = {donor:"Donor",major_donor:"Major Donor",volunteer:"Volunteer",partner:"Partner",foundation:"Foundation",beneficiary:"Beneficiary",prospect:"Prospect"};

/* ----------------------------- Small UI ----------------------------- */
const Badge = ({children, className}) => <span className={cls("inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium", className)}>{children}</span>;

/* ----------------------------- Charts ----------------------------- */
function BarChart({data, color="#0F766E", height=170}){
  const max = Math.max(1, ...data.map(d=>d.v));
  const bw = 100/Math.max(1,data.length);
  return (
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full" style={{height}}>
      <defs><linearGradient id="barG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor={color} stopOpacity="0.95"/><stop offset="1" stopColor={color} stopOpacity="0.55"/></linearGradient></defs>
      {data.map((d,i)=>{const h=(d.v/max)*88;return <rect key={i} x={i*bw+bw*0.2} y={100-h-6} width={bw*0.6} height={h} rx="1.4" fill="url(#barG)" className="bar-grow" style={{animationDelay:`${i*40}ms`}}><title>{`${d.k}: ${eur(d.v)}`}</title></rect>;})}
    </svg>
  );
}
function LineChart({data, color="#0F766E", height=180}){
  const max = Math.max(1, ...data.map(d=>d.v));
  const n = data.length;
  const pts = data.map((d,i)=>[ n<2?50:(i/(n-1))*100, 100-(d.v/max)*84-8 ]);
  const path = pts.map((p,i)=>`${i?"L":"M"}${p[0].toFixed(2)} ${p[1].toFixed(2)}`).join(" ");
  const area = `${path} L100 100 L0 100 Z`;
  return (
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full" style={{height}}>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor={color} stopOpacity="0.28"/><stop offset="1" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#lg)"/>
      <path d={path} fill="none" stroke={color} strokeWidth="1.6" vectorEffect="non-scaling-stroke" strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="1.4" fill="#fff" stroke={color} strokeWidth="1" vectorEffect="non-scaling-stroke"><title>{`${data[i].k}: ${eur(data[i].v)}`}</title></circle>)}
    </svg>
  );
}
function Donut({data, size=150}){
  const total = data.reduce((s,d)=>s+d.v,0)||1;
  let acc=0; const r=42, c=2*Math.PI*r;
  return (
    <svg viewBox="0 0 110 110" width={size} height={size}>
      <g transform="rotate(-90 55 55)">
        {data.map((d,i)=>{const frac=d.v/total;const dash=`${frac*c} ${c}`;const el=<circle key={i} cx="55" cy="55" r={r} fill="none" stroke={d.c} strokeWidth="14" strokeDasharray={dash} strokeDashoffset={-acc*c}><title>{`${d.k}: ${eur(d.v)}`}</title></circle>;acc+=frac;return el;})}
      </g>
      <text x="55" y="52" textAnchor="middle" className="fill-slate-800" style={{fontSize:"13px",fontWeight:700}}>{eur(total)}</text>
      <text x="55" y="66" textAnchor="middle" className="fill-slate-400" style={{fontSize:"7px"}}>total raised</text>
    </svg>
  );
}

/* ----------------------------- Icons ----------------------------- */
const Icon = ({d, className="w-5 h-5"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const icons = {

  volunteers:<><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8L12 21l8.8-8.6a5.5 5.5 0 0 0 0-7.8z"/></>,
  reports:<><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 4-5"/></>,
  settings:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.6.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
  search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,

  clock:<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
  bell:<><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
  bolt:<><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>,

  upload:<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,

/* ============================ App ============================ */
function App(){
  const [view, setView] = useState("dashboard");
  const [loading, setLoading] = useState(true);
  const [org, setOrg] = useState(null);
  const [db, setDb] = useState(null);
  const [search, setSearch] = useState("");
  const [me, setMe] = useState(null);
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [quickAdd, setQuickAdd] = useState(null); // 'contact'|'donation'|'task'|'campaign'
  const [notifOpen, setNotifOpen] = useState(false);

  const loadAll = useCallback(async ()=>{
    const {data:orgs} = await sb.from("organizations").select("*").limit(1);
    const o = orgs && orgs[0];
    if(!o){ setLoading(false); return; }
    setOrg(o);
    const oid = o.id;
    const q = (t,order) => { let r = sb.from(t).select("*").eq("org_id",oid); if(order) r=r.order(order.col,{ascending:order.asc}); return r; };
    const [members,contacts,campaigns,donations,pipelines,stages,opps,spaces,lists,statuses,tasks,shifts,activities,cfDefs,views] = await Promise.all([
      q("members"),q("contacts",{col:"created_at",asc:true}),q("campaigns"),
      q("donations",{col:"donation_date",asc:true}),q("pipelines"),
      q("pipeline_stages",{col:"position",asc:true}),q("opportunities"),
      q("spaces",{col:"position",asc:true}),q("lists",{col:"position",asc:true}),
      q("task_statuses",{col:"position",asc:true}),q("tasks",{col:"position",asc:true}),
      q("volunteer_shifts"),q("activities",{col:"created_at",asc:false}),
      q("custom_field_defs",{col:"position",asc:true}),q("saved_views",{col:"created_at",asc:true}),
    ]);
    const d = {
      members:members.data||[],contacts:contacts.data||[],campaigns:campaigns.data||[],
      donations:donations.data||[],pipelines:pipelines.data||[],stages:stages.data||[],
      opps:opps.data||[],spaces:spaces.data||[],lists:lists.data||[],statuses:statuses.data||[],
      tasks:tasks.data||[],shifts:shifts.data||[],activities:activities.data||[],
      cfDefs:cfDefs.data||[],views:views.data||[],
    };
    setDb(d);
    setMe(prev => prev || (d.members[0]&&d.members[0].id));
    setLoading(false);
  },[]);

  useEffect(()=>{ loadAll(); },[loadAll]);
  useEffect(()=>{
    const h = e => {
      if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="k"){ e.preventDefault(); setPaletteOpen(p=>!p); }
      if(e.key==="Escape"){ setPaletteOpen(false); }
    };
    window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h);
  },[]);

  if(loading) return <div className="h-screen flex flex-col items-center justify-center gap-3 text-slate-500"><div className="spinner"></div><div>Loading NoonOS…</div></div>;
  if(!org) return <div className="h-screen flex items-center justify-center text-slate-500">No organization found.</div>;

  const nav = [
    ["dashboard","Dashboard",icons.dashboard],
    ["mywork","My Work",icons.mywork],
    ["donors","Donors / CRM",icons.donors],
    ["donations","Donations",icons.donations],
    ["campaigns","Campaigns",icons.campaigns],
    ["pipeline","Pipelines",icons.pipeline],
    ["tasks","Tasks",icons.tasks],
    ["volunteers","Volunteers",icons.volunteers],
    ["reports","Analytics",icons.reports],
    ["settings","Settings",icons.settings],
  ];
  const meMember = db.members.find(m=>m.id===me)||db.members[0];
  const myNotifs = db.tasks.filter(t=>!t.completed && t.assignee_id===me && t.due_date && daysUntil(t.due_date)<=7)
    .sort((a,b)=>new Date(a.due_date)-new Date(b.due_date));
  const ctx = { org, db, reload:loadAll, search, me, setView, openQuickAdd:setQuickAdd };

  return (
    <div className="flex h-screen overflow-hidden">
      {/* Sidebar */}
      <aside className="w-60 shrink-0 flex flex-col text-slate-300" style={{background:"linear-gradient(180deg,#0b1220,#0f172a)"}}>
        <div className="px-4 py-4 flex items-center gap-2.5 border-b border-white/5">
          <NoonMark size={36}/>
          <div>
            <div className="text-white font-bold leading-tight tracking-tight">NoonOS</div>
            <div className="text-[10px] text-slate-500">Charity Management</div>
          </div>
        </div>
        <nav className="flex-1 py-3 px-2 space-y-0.5 overflow-y-auto">
          {nav.map(([k,label,ic])=>(
            <button key={k} onClick={()=>setView(k)} className={cls("nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm", view===k?"nav-active text-white":"text-slate-400 hover:bg-white/5 hover:text-slate-200")}>
              <Icon d={ic} className="w-[18px] h-[18px]"/> {label}
            </button>
          ))}
        </nav>
        <button onClick={()=>setPaletteOpen(true)} className="mx-2 mb-2 flex items-center justify-between px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 text-slate-400 text-xs transition">
          <span className="flex items-center gap-2"><Icon d={icons.search} className="w-4 h-4"/> Quick search</span>
          <kbd className="px-1.5 py-0.5 rounded bg-white/10 text-[10px]">⌘K</kbd>
        </button>
        <div className="p-3 border-t border-white/5 text-xs flex items-center gap-2">
          <div className="w-7 h-7 rounded-md flex items-center justify-center text-white font-bold text-[11px]" style={{background:"linear-gradient(135deg,#0F766E,#10B981)"}}>{initials(org.name)}</div>
          <div className="truncate"><div className="text-slate-200 truncate">{org.name}</div><div className="text-slate-500 capitalize">{org.plan} plan</div></div>
        </div>
      </aside>

      {/* Main */}
      <div className="flex-1 flex flex-col overflow-hidden">
        <header className="h-14 glass border-b border-slate-200 flex items-center gap-3 px-5 shrink-0 z-10">
          <button onClick={()=>setPaletteOpen(true)} className="relative flex-1 max-w-md text-left">
            <Icon d={icons.search} className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
            <div className="w-full pl-9 pr-3 py-1.5 bg-slate-100 hover:bg-slate-200/70 rounded-lg text-sm text-slate-400 transition flex items-center justify-between">
              <span>Search or jump to…</span><kbd className="px-1.5 py-0.5 rounded bg-white text-[10px] text-slate-400 border border-slate-200">⌘K</kbd>
            </div>
          </button>
          <button onClick={()=>setQuickAdd("menu")} className="btn-grad text-white text-sm px-3 py-2 rounded-lg flex items-center gap-1.5"><Icon d={icons.plus} className="w-4 h-4"/> New</button>
          {/* Notifications */}
          <div className="relative">
            <button onClick={()=>setNotifOpen(o=>!o)} className="relative w-9 h-9 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-500 transition">
              <Icon d={icons.bell} className="w-5 h-5"/>
              {myNotifs.length>0 && <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full" style={{animation:"pulse 1.8s infinite"}}></span>}
            </button>
            {notifOpen && <NotifPanel notifs={myNotifs} onClose={()=>setNotifOpen(false)} go={()=>{setView("mywork");setNotifOpen(false);}}/>}
          </div>
          {/* User switcher */}
          <select value={me||""} onChange={e=>setMe(e.target.value)} className="text-xs border border-slate-200 rounded-lg pl-2 pr-1 py-1.5 text-slate-600 bg-white" title="Acting as (demo)">
            {db.members.map(m=><option key={m.id} value={m.id}>{m.full_name}</option>)}
          </select>
          <Avatar name={meMember?.full_name} className="w-8 h-8"/>
        </header>
        <main className="flex-1 overflow-y-auto p-6">
          {view==="dashboard" && <Dashboard {...ctx}/>}
          {view==="mywork" && <MyWork {...ctx}/>}
          {view==="donors" && <Donors {...ctx}/>}
          {view==="donations" && <Donations {...ctx}/>}
          {view==="campaigns" && <Campaigns {...ctx}/>}
          {view==="pipeline" && <Pipelines {...ctx}/>}
          {view==="tasks" && <Tasks {...ctx}/>}
          {view==="volunteers" && <Volunteers {...ctx}/>}
          {view==="reports" && <Analytics {...ctx}/>}
          {view==="settings" && <Settings {...ctx}/>}
        </main>
      </div>

      {paletteOpen && <CommandPalette db={db} onClose={()=>setPaletteOpen(false)} go={v=>{setView(v);setPaletteOpen(false);}} quick={t=>{setQuickAdd(t);setPaletteOpen(false);}}/>}
      {quickAdd==="menu" && <QuickAddMenu onPick={t=>setQuickAdd(t)} onClose={()=>setQuickAdd(null)}/>}
      {quickAdd==="contact" && <AddContact org={org} db={db} onClose={()=>setQuickAdd(null)} reload={loadAll}/>}
      {quickAdd==="donation" && <AddDonation org={org} db={db} onClose={()=>setQuickAdd(null)} reload={loadAll}/>}
      {quickAdd==="task" && <AddTask org={org} db={db} onClose={()=>setQuickAdd(null)} reload={loadAll}/>}
      {quickAdd==="campaign" && <AddCampaign org={org} db={db} onClose={()=>setQuickAdd(null)} reload={loadAll}/>}
    </div>
  );
}

/* ============================ Command palette ============================ */
function CommandPalette({db, onClose, go, quick}){
  const [qy,setQy]=useState("");
  const inputRef=useRef();
  useEffect(()=>{ inputRef.current && inputRef.current.focus(); },[]);
  const s=qy.toLowerCase();
  const actions=[
    {label:"New donation",kind:"Action",run:()=>quick("donation"),ic:icons.donations},
    {label:"New task",kind:"Action",run:()=>quick("task"),ic:icons.tasks},
    {label:"Add contact",kind:"Action",run:()=>quick("contact"),ic:icons.donors},
    {label:"New campaign",kind:"Action",run:()=>quick("campaign"),ic:icons.campaigns},
    {label:"Go to Analytics",kind:"Navigate",run:()=>go("reports"),ic:icons.reports},
    {label:"Go to Pipelines",kind:"Navigate",run:()=>go("pipeline"),ic:icons.pipeline},
    {label:"Go to My Work",kind:"Navigate",run:()=>go("mywork"),ic:icons.mywork},
  ].filter(a=>!s||a.label.toLowerCase().includes(s));
  const cResults = s? db.contacts.filter(c=>fullName(c).toLowerCase().includes(s)||(c.email||"").toLowerCase().includes(s)).slice(0,5).map(c=>({label:fullName(c),kind:"Donor",sub:c.email,run:()=>go("donors")})):[];
  const tResults = s? db.tasks.filter(t=>t.title.toLowerCase().includes(s)).slice(0,5).map(t=>({label:t.title,kind:"Task",run:()=>go("tasks")})):[];
  const kResults = s? db.campaigns.filter(c=>c.name.toLowerCase().includes(s)).slice(0,4).map(c=>({label:c.name,kind:"Campaign",run:()=>go("campaigns")})):[];
  const all=[...actions,...cResults,...tResults,...kResults];
  const [idx,setIdx]=useState(0);
  useEffect(()=>setIdx(0),[qy]);
  const onKey=e=>{
    if(e.key==="ArrowDown"){e.preventDefault();setIdx(i=>Math.min(all.length-1,i+1));}
    if(e.key==="ArrowUp"){e.preventDefault();setIdx(i=>Math.max(0,i-1));}
    if(e.key==="Enter"&&all[idx]){e.preventDefault();all[idx].run();}
  };
  return (
    <div className="fixed inset-0 z-[60] flex items-start justify-center bg-slate-900/50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-xl mt-24 scale-in overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-2 px-4 border-b border-slate-100">
          <Icon d={icons.search} className="w-5 h-5 text-slate-400"/>
          <input ref={inputRef} value={qy} onChange={e=>setQy(e.target.value)} onKeyDown={onKey} placeholder="Search donors, tasks, campaigns — or run a command…" className="flex-1 py-3.5 text-sm focus:outline-none"/>
          <kbd className="px-1.5 py-0.5 rounded bg-slate-100 text-[10px] text-slate-400">ESC</kbd>
        </div>
        <div className="max-h-80 overflow-y-auto py-2">
          {all.map((a,i)=>(
            <button key={i} onMouseEnter={()=>setIdx(i)} onClick={()=>a.run()} className={cls("w-full flex items-center gap-3 px-4 py-2.5 text-left text-sm", i===idx?"bg-emerald-50":"")}>
              <span className={cls("w-7 h-7 rounded-lg flex items-center justify-center", i===idx?"bg-emerald-100 text-emerald-700":"bg-slate-100 text-slate-500")}>{a.ic?<Icon d={a.ic} className="w-4 h-4"/>:<Icon d={icons.search} className="w-4 h-4"/>}</span>
              <span className="flex-1"><span className="text-slate-800">{a.label}</span>{a.sub&&<span className="text-slate-400 ml-2 text-xs">{a.sub}</span>}</span>
              <Badge className="bg-slate-100 text-slate-500">{a.kind}</Badge>
            </button>
          ))}
          {!all.length && <div className="px-4 py-8 text-center text-slate-400 text-sm">No matches.</div>}
        </div>
      </div>
    </div>
  );
}
function QuickAddMenu({onPick,onClose}){
  const items=[["donation","Donation",icons.donations],["contact","Contact",icons.donors],["task","Task",icons.tasks],["campaign","Campaign",icons.campaigns]];
  return <Modal title="Create new…" onClose={onClose}>
    <div className="grid grid-cols-2 gap-3">
      {items.map(([k,l,ic])=><button key={k} onClick={()=>onPick(k)} className="card card-hover p-4 flex flex-col items-center gap-2 text-slate-700"><span className="w-10 h-10 rounded-xl flex items-center justify-center text-white" style={{background:"linear-gradient(135deg,#0F766E,#10B981)"}}><Icon d={ic}/></span><span className="text-sm font-medium">{l}</span></button>)}
    </div>
  </Modal>;
}
function NotifPanel({notifs,onClose,go}){
  return (
    <div className="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-2xl border border-slate-100 z-50 scale-in overflow-hidden" onMouseLeave={onClose}>
      <div className="px-4 py-2.5 border-b border-slate-100 font-semibold text-sm text-slate-700">Notifications</div>
      <div className="max-h-80 overflow-y-auto divide-y divide-slate-50">
        {notifs.map(t=>{const dd=daysUntil(t.due_date);return(
          <div key={t.id} className="px-4 py-2.5 flex items-start gap-2 hover:bg-slate-50">
            <span className={cls("mt-1 w-2 h-2 rounded-full shrink-0",dd<0?"bg-rose-500":dd<2?"bg-amber-500":"bg-emerald-500")}></span>
            <div className="text-sm"><div className="text-slate-700 leading-snug">{t.title}</div><div className="text-xs text-slate-400">{dd<0?`${-dd}d overdue`:dd===0?"due today":`due in ${dd}d`}</div></div>
          </div>);})}
        {!notifs.length && <div className="px-4 py-8 text-center text-slate-400 text-sm">You're all caught up ✨</div>}
      </div>
      <button onClick={go} className="w-full py-2.5 text-sm font-medium text-emerald-700 hover:bg-emerald-50 transition">Open My Work →</button>

/* ============================ Dashboard ============================ */
function Dashboard({org,db,setView}){
  const completed = db.donations.filter(d=>d.status==="completed");
  const raised = completed.reduce((s,d)=>s+Number(d.amount),0);
  const recurring = completed.filter(d=>d.type==="recurring").reduce((s,d)=>s+Number(d.amount),0);
  const donorCount = db.contacts.filter(c=>c.type==="donor"||c.type==="major_donor").length;
  const activeCamp = db.campaigns.filter(c=>c.status==="active").length;
  const openTasks = db.tasks.filter(t=>!t.completed).length;
  const dueSoon = db.tasks.filter(t=>!t.completed && t.due_date && daysUntil(t.due_date)<=14).sort((a,b)=>new Date(a.due_date)-new Date(b.due_date));
  const byMonth={}; completed.forEach(d=>{const k=(d.donation_date||"").slice(0,7); byMonth[k]=(byMonth[k]||0)+Number(d.amount);});
  const months = Object.keys(byMonth).sort().slice(-8).map(k=>({k,v:byMonth[k]}));
  const memberName = id => (db.members.find(m=>m.id===id)||{}).full_name;
  const kpis=[
    {label:"Total Raised",value:eur(raised),sub:`${completed.length} gifts`,grad:"from-emerald-500 to-teal-600",delta:"+12%"},
    {label:"Recurring Revenue",value:eur(recurring),sub:"monthly & repeat",grad:"from-sky-500 to-blue-600",delta:"+8%"},
    {label:"Donors",value:donorCount,sub:`${db.contacts.length} contacts`,grad:"from-violet-500 to-purple-600",delta:"+5"},
    {label:"Active Campaigns",value:activeCamp,sub:`${openTasks} open tasks`,grad:"from-amber-500 to-orange-600",delta:""},
  ];
  return (
    <div className="space-y-6">
      <div className="fade-up"><h1 className="text-xl font-bold text-slate-800">Good day, {db.members[0]?.full_name?.split(" ")[0]||"team"} 👋</h1><p className="text-sm text-slate-500">Here's how {org.name} is doing.</p></div>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        {kpis.map((k,i)=>(
          <Card key={k.label} hover className="p-4 fade-up overflow-hidden relative" >
            <div style={{animationDelay:`${i*60}ms`}}>
              <div className={cls("absolute -right-6 -top-6 w-20 h-20 rounded-full opacity-10 bg-gradient-to-br",k.grad)}></div>
              <div className="text-xs text-slate-500">{k.label}</div>
              <div className={cls("text-2xl font-bold mt-1 bg-gradient-to-r bg-clip-text text-transparent",k.grad)}>{k.value}</div>
              <div className="flex items-center gap-2 mt-1"><span className="text-xs text-slate-400">{k.sub}</span>{k.delta&&<Badge className="bg-emerald-50 text-emerald-600">{k.delta}</Badge>}</div>
            </div>
          </Card>
        ))}
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <Card className="p-5 lg:col-span-2 fade-up">
          <div className="flex items-center justify-between mb-3"><h2 className="font-semibold text-slate-800">Donations over time</h2><span className="text-xs text-slate-400">last {months.length} months</span></div>
          <BarChart data={months}/>
          <div className="flex justify-between mt-2 text-[10px] text-slate-400">{months.map(m=><span key={m.k}>{m.k.slice(2)}</span>)}</div>
        </Card>
        <Card className="p-5 fade-up">
          <h2 className="font-semibold text-slate-800 mb-3">Tasks due soon</h2>
          <div className="space-y-2">
            {dueSoon.slice(0,6).map(t=>{const dd=daysUntil(t.due_date);return <div key={t.id} className="flex items-center gap-2 text-sm group"><span className={cls("w-2 h-2 rounded-full shrink-0",dd<3?"bg-rose-500":dd<7?"bg-amber-500":"bg-emerald-500")}></span><span className="flex-1 truncate text-slate-700 group-hover:text-emerald-700 transition">{t.title}</span><span className="text-xs text-slate-400">{dd}d</span></div>;})}
            {!dueSoon.length && <p className="text-sm text-slate-400">Nothing due. 🎉</p>}
          </div>
          <button onClick={()=>setView("tasks")} className="mt-3 text-xs font-medium text-emerald-700 hover:underline">View all tasks →</button>
        </Card>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <Card className="p-5 lg:col-span-2 fade-up">
          <div className="flex items-center justify-between mb-3"><h2 className="font-semibold text-slate-800">Campaign progress</h2><button onClick={()=>setView("campaigns")} className="text-xs font-medium text-emerald-700 hover:underline">All campaigns →</button></div>
          <div className="space-y-4">
            {db.campaigns.slice(0,5).map(c=>{const pct=Math.min(100,Math.round((c.raised_amount/Math.max(1,c.goal_amount))*100));return <div key={c.id}><div className="flex justify-between text-sm mb-1"><span className="text-slate-700 font-medium">{c.name}</span><span className="text-slate-500">{eur(c.raised_amount)} / {eur(c.goal_amount)}</span></div><div className="h-2 bg-slate-100 rounded-full overflow-hidden"><div className="h-full rounded-full bar-grow" style={{width:`${pct}%`,background:"linear-gradient(90deg,#0F766E,#10B981)"}}></div></div></div>;})}
          </div>
        </Card>
        <Card className="p-5 fade-up">
          <h2 className="font-semibold text-slate-800 mb-3">Recent activity</h2>
          <div className="space-y-3">
            {db.activities.slice(0,6).map(a=>{const c=db.contacts.find(x=>x.id===a.contact_id);return <div key={a.id} className="flex gap-2 text-sm"><Avatar name={memberName(a.member_id)||"?"} className="w-6 h-6"/><div><div className="text-slate-700"><span className="font-medium">{a.subject}</span></div><div className="text-xs text-slate-400">{fullName(c)} · {a.type}</div></div></div>;})}
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ============================ My Work ============================ */
function MyWork({db,me,reload,setView}){
  const meMember = db.members.find(m=>m.id===me);
  const mine = db.tasks.filter(t=>t.assignee_id===me);
  const open = mine.filter(t=>!t.completed);
  const overdue = open.filter(t=>t.due_date && daysUntil(t.due_date)<0).sort((a,b)=>new Date(a.due_date)-new Date(b.due_date));
  const today = open.filter(t=>t.due_date && daysUntil(t.due_date)===0);
  const week = open.filter(t=>t.due_date && daysUntil(t.due_date)>0 && daysUntil(t.due_date)<=7);
  const later = open.filter(t=>!t.due_date || daysUntil(t.due_date)>7);
  const myActs = db.activities.filter(a=>a.member_id===me).slice(0,8);
  const statusName=id=>(db.statuses.find(s=>s.id===id)||{});
  const listName=id=>(db.lists.find(l=>l.id===id)||{}).name;
  const toggle=async t=>{ const done=db.statuses.find(s=>s.type==="done"); await sb.from("tasks").update({completed:!t.completed,status_id:!t.completed&&done?done.id:t.status_id}).eq("id",t.id); reload(); };

  const Section=({title,items,accent})=> items.length?(
    <div className="fade-up">
      <div className="flex items-center gap-2 mb-2"><span className={cls("w-2 h-2 rounded-full",accent)}></span><h3 className="font-semibold text-slate-700 text-sm">{title}</h3><span className="text-xs text-slate-400">{items.length}</span></div>
      <Card className="divide-y divide-slate-50">
        {items.map(t=>{const st=statusName(t.status_id);return(
          <div key={t.id} className="flex items-center gap-3 px-4 py-2.5 row-hover hover:bg-slate-50">
            <button onClick={()=>toggle(t)} className="w-4 h-4 rounded-full border-2 border-slate-300 hover:border-emerald-500 transition shrink-0"></button>
            <div className="flex-1 min-w-0"><div className="text-sm text-slate-800 truncate">{t.title}</div><div className="text-xs text-slate-400">{listName(t.list_id)}</div></div>
            <Badge className={PRIO[t.priority].c}>{PRIO[t.priority].l}</Badge>
            <span className="inline-flex items-center gap-1.5 text-xs text-slate-500 w-24"><span className="w-2 h-2 rounded-full" style={{background:st.color}}></span>{st.name}</span>
            <span className="text-xs text-slate-400 w-20 text-right">{fdate(t.due_date)}</span>
          </div>);})}
      </Card>
    </div>
  ):null;

  return (
    <div className="space-y-6">
      <div className="flex items-center gap-3 fade-up"><Avatar name={meMember?.full_name} className="w-11 h-11 text-base"/><div><h1 className="text-xl font-bold text-slate-800">My Work</h1><p className="text-sm text-slate-500">{meMember?.title} · {open.length} open tasks</p></div></div>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
        {[["Overdue",overdue.length,"text-rose-600"],["Due today",today.length,"text-amber-600"],["This week",week.length,"text-sky-600"],["Completed",mine.filter(t=>t.completed).length,"text-emerald-600"]].map(([l,v,c],i)=>
          <Card key={l} hover className="p-4 fade-up"><div className="text-xs text-slate-500">{l}</div><div className={cls("text-2xl font-bold mt-1",c)}>{v}</div></Card>)}
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div className="lg:col-span-2 space-y-5">
          <Section title="Overdue" items={overdue} accent="bg-rose-500"/>
          <Section title="Due today" items={today} accent="bg-amber-500"/>
          <Section title="This week" items={week} accent="bg-sky-500"/>
          <Section title="Later / no date" items={later} accent="bg-slate-400"/>
          {!open.length && <Card className="p-8 text-center text-slate-400 fade-up">No open tasks assigned to you 🎉</Card>}
        </div>
        <Card className="p-5 fade-up h-fit">
          <h3 className="font-semibold text-slate-700 text-sm mb-3">My recent activity</h3>
          <div className="space-y-3">
            {myActs.map(a=>{const c=db.contacts.find(x=>x.id===a.contact_id);return <div key={a.id} className="text-sm border-l-2 border-emerald-200 pl-3"><div className="text-slate-700">{a.subject}</div><div className="text-xs text-slate-400">{a.type} · {fullName(c)} · {fdate(a.created_at)}</div></div>;})}
            {!myActs.length && <p className="text-sm text-slate-400">No activity yet.</p>}
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ============================ Donors / CRM ============================ */
function Donors({org,db,reload,search}){
  const [filter,setFilter]=useState({type:"all",status:"all"});
  const [activeView,setActiveView]=useState("all");
  const [selected,setSelected]=useState(null);
  const [adding,setAdding]=useState(false);
  const [sel,setSel]=useState({}); // bulk selection
  const [importing,setImporting]=useState(false);
  const [savingView,setSavingView]=useState(false);

  const giftsByContact=useMemo(()=>{const m={};db.donations.forEach(d=>{if(d.contact_id)m[d.contact_id]=(m[d.contact_id]||0)+(d.status==="completed"?Number(d.amount):0);});return m;},[db.donations]);
  const views=db.views.filter(v=>v.module==="donors");

  const applyView=v=>{ setActiveView(v.id); const cfg=v.config||{}; setFilter({type:cfg.type||"all",status:cfg.status||"all"}); };
  const clearView=()=>{ setActiveView("all"); setFilter({type:"all",status:"all"}); };

  const rows=db.contacts.filter(c=>{
    if(filter.type!=="all"&&c.type!==filter.type)return false;
    if(filter.status!=="all"&&c.status!==filter.status)return false;
    if(search){const s=search.toLowerCase();const hay=`${fullName(c)} ${c.email||""} ${(c.tags||[]).join(" ")}`.toLowerCase();if(!hay.includes(s))return false;}
    return true;
  });
  const selIds=Object.keys(sel).filter(k=>sel[k]);
  const allChecked=rows.length>0&&rows.every(r=>sel[r.id]);
  const toggleAll=()=>{ if(allChecked){setSel({});} else {const n={};rows.forEach(r=>n[r.id]=true);setSel(n);} };

  const exportCsv=()=>{
    const cols=["first_name","last_name","organization_name","type","email","phone","city","status","tags","lifetime_value"];
    const head=cols.join(",");
    const lines=rows.map(c=>cols.map(k=>{let v=c[k]; if(Array.isArray(v))v=v.join("|"); v=(v??"").toString().replace(/"/g,'""'); return /[",\n]/.test(v)?`"${v}"`:v;}).join(","));
    const blob=new Blob([head+"\n"+lines.join("\n")],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="noonos-donors.csv";a.click();
  };
  const bulk=async(action,value)=>{
    if(action==="status") await sb.from("contacts").update({status:value}).in("id",selIds);
    if(action==="delete") await sb.from("contacts").delete().in("id",selIds);
    if(action==="tag"){ for(const id of selIds){const c=db.contacts.find(x=>x.id===id);const tags=Array.from(new Set([...(c.tags||[]),value]));await sb.from("contacts").update({tags}).eq("id",id);} }
    setSel({}); reload();
  };

  const tabs=[["all","All"],["donor","Donors"],["major_donor","Major"],["volunteer","Volunteers"],["foundation","Foundations"],["partner","Partners"],["prospect","Prospects"]];

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between fade-up">
        <h1 className="text-xl font-bold text-slate-800">Donors & CRM</h1>
        <div className="flex items-center gap-2">
          <button onClick={exportCsv} className="flex items-center gap-1.5 bg-white border border-slate-200 text-slate-600 text-sm px-3 py-2 rounded-lg hover:bg-slate-50 lift transition"><Icon d={icons.download} className="w-4 h-4"/> Export</button>
          <button onClick={()=>setImporting(true)} className="flex items-center gap-1.5 bg-white border border-slate-200 text-slate-600 text-sm px-3 py-2 rounded-lg hover:bg-slate-50 lift transition"><Icon d={icons.upload} className="w-4 h-4"/> Import</button>
          <button onClick={()=>setAdding(true)} className="btn-grad text-white text-sm px-3 py-2 rounded-lg flex items-center gap-1.5"><Icon d={icons.plus} className="w-4 h-4"/> Add contact</button>
        </div>
      </div>

      {/* Saved views */}
      <div className="flex flex-wrap items-center gap-2 fade-up">
        <span className="text-xs text-slate-400 mr-1">Views:</span>
        <button onClick={clearView} className={cls("chip px-3 py-1 rounded-full text-xs",activeView==="all"?"bg-slate-800 text-white":"bg-white border border-slate-200 text-slate-600 hover:bg-slate-50")}>All contacts</button>
        {views.map(v=><button key={v.id} onClick={()=>applyView(v)} className={cls("chip px-3 py-1 rounded-full text-xs",activeView===v.id?"bg-slate-800 text-white":"bg-white border border-slate-200 text-slate-600 hover:bg-slate-50")}>★ {v.name}</button>)}
        <button onClick={()=>setSavingView(true)} className="chip px-3 py-1 rounded-full text-xs border border-dashed border-slate-300 text-slate-400 hover:text-emerald-600 hover:border-emerald-300">+ Save current</button>
      </div>

      {/* Type tabs */}
      <div className="flex flex-wrap gap-2">
        {tabs.map(([k,l])=><button key={k} onClick={()=>{setFilter(f=>({...f,type:k}));setActiveView("all");}} className={cls("chip px-3 py-1.5 rounded-full text-sm",filter.type===k?"bg-emerald-600 text-white":"bg-white border border-slate-200 text-slate-600 hover:bg-slate-50")}>{l}</button>)}
      </div>

      {/* Bulk bar */}
      {selIds.length>0 && (
        <div className="flex items-center gap-3 bg-slate-800 text-white rounded-xl px-4 py-2.5 slide-in">
          <span className="text-sm font-medium">{selIds.length} selected</span>
          <div className="h-4 w-px bg-white/20"></div>

function ImportCsv({org,onClose,reload}){
  const [text,setText]=useState("");
  const [preview,setPreview]=useState([]);
  const parse=raw=>{
    const lines=raw.trim().split(/\r?\n/); if(!lines.length)return[];
    const head=lines[0].split(",").map(h=>h.trim().toLowerCase());
    return lines.slice(1).map(line=>{const cells=line.split(",");const o={};head.forEach((h,i)=>o[h]=(cells[i]||"").trim());return o;}).filter(o=>o.email||o.first_name||o.organization_name);
  };
  const onText=v=>{ setText(v); setPreview(parse(v)); };
  const onFile=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>onText(r.result); r.readAsText(f); };
  const doImport=async()=>{
    const rows=preview.map(o=>({org_id:org.id,type:o.type||"donor",first_name:o.first_name||null,last_name:o.last_name||null,organization_name:o.organization_name||null,email:o.email||null,phone:o.phone||null,city:o.city||null,country:o.country||"DE",status:o.status||"active",source:"CSV import",tags:o.tags?o.tags.split(/[|;]/).map(x=>x.trim()).filter(Boolean):[]}));
    if(rows.length) await sb.from("contacts").insert(rows);
    onClose(); reload();
  };
  return <Modal title="Import contacts (CSV)" onClose={onClose} wide>
    <p className="text-sm text-slate-500 mb-2">Header row required. Recognised columns: <code className="text-xs bg-slate-100 px-1 rounded">first_name, last_name, organization_name, type, email, phone, city, country, status, tags</code> (tags separated by | ).</p>
    <input type="file" accept=".csv,text/csv" onChange={onFile} className="mb-2 text-sm"/>
    <textarea value={text} onChange={e=>onText(e.target.value)} rows="5" className={inputCls} placeholder={"first_name,last_name,email,type,city,tags\nFatima,Noor,fatima@example.com,donor,Berlin,zakat|water"}></textarea>
    {preview.length>0 && <div className="mt-3"><div className="text-xs text-slate-500 mb-1">{preview.length} rows ready</div><div className="max-h-40 overflow-y-auto border border-slate-200 rounded-lg"><table className="w-full text-xs"><tbody>{preview.slice(0,8).map((o,i)=><tr key={i} className="border-b border-slate-50"><td className="px-2 py-1">{o.first_name} {o.last_name}{o.organization_name}</td><td className="px-2 py-1 text-slate-400">{o.email}</td><td className="px-2 py-1 text-slate-400">{o.type||"donor"}</td></tr>)}</tbody></table></div></div>}
    <div className="flex justify-end gap-2 mt-4"><button onClick={onClose} className="px-4 py-2 text-sm text-slate-600">Cancel</button><button onClick={doImport} disabled={!preview.length} className="btn-grad text-white px-4 py-2 text-sm rounded-lg disabled:opacity-40">Import {preview.length||""}</button></div>
  </Modal>;
}

  const total=gifts.filter(g=>g.status==="completed").reduce((s,g)=>s+Number(g.amount),0);
  const [note,setNote]=useState("");
  const [custom,setCustom]=useState(contact.custom||{});

        <div className="p-5 grid grid-cols-2 gap-3">
          <div className="bg-emerald-50 rounded-xl p-3"><div className="text-xs text-emerald-700">Lifetime giving</div><div className="text-xl font-bold text-emerald-800">{eur(total)}</div></div>
          <div className="bg-slate-50 rounded-xl p-3"><div className="text-xs text-slate-500">Gifts</div><div className="text-xl font-bold text-slate-700">{gifts.length}</div></div>
        </div>
        <div className="px-5 pb-3 text-sm text-slate-600 space-y-1">
          {contact.phone&&<div>📞 {contact.phone}</div>}{contact.city&&<div>📍 {contact.city}, {contact.country}</div>}{contact.source&&<div>🔗 Source: {contact.source}</div>}
        </div>
        {cfDefs.length>0 && <div className="px-5 py-3 border-t border-slate-100">
          <h4 className="font-semibold text-slate-700 text-sm mb-2">Custom fields</h4>
          <div className="space-y-2">
            {cfDefs.map(f=>(
              <div key={f.id} className="flex items-center gap-2">
                <span className="text-xs text-slate-500 w-32 shrink-0">{f.label}</span>
                {f.type==="select"

                  : <input value={custom[f.key]||""} onChange={e=>setCustom({...custom,[f.key]:e.target.value})} onBlur={e=>saveCustom(f.key,e.target.value)} className="flex-1 text-sm border border-slate-200 rounded px-2 py-1"/>}
              </div>
            ))}

        <div className="px-5 py-3 border-t border-slate-100">

          <div className="space-y-2">{gifts.map(g=><div key={g.id} className="flex items-center justify-between text-sm"><div><div className="text-slate-700">{campName(g.campaign_id)||"General"}</div><div className="text-xs text-slate-400">{fdate(g.donation_date)} · {g.method} · {g.type}</div></div><div className="font-medium text-slate-800">{eur(g.amount)}</div></div>)}{!gifts.length&&<p className="text-sm text-slate-400">No gifts yet.</p>}</div>

          <div className="space-y-2">{acts.map(a=><div key={a.id} className="text-sm border-l-2 border-emerald-200 pl-3"><div className="text-slate-700">{a.subject}</div><div className="text-xs text-slate-400">{a.type} · {memberName(a.member_id)||"system"} · {fdate(a.created_at)}</div></div>)}{!acts.length&&<p className="text-sm text-slate-400">No activity logged.</p>}</div>

            <p className="text-xs text-slate-500 mt-1 line-clamp-2 h-8">{c.description}</p>
            <div className="mt-3">
              <div className="flex justify-between text-sm mb-1"><span className="font-semibold" style={{color:cc}}>{eur(c.raised_amount)}</span><span className="text-slate-400">of {eur(c.goal_amount)}</span></div>
              <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full rounded-full bar-grow" style={{width:`${pct}%`,background:`linear-gradient(90deg,${cc},${cc}cc)`}}></div></div>
              <div className="flex justify-between text-xs text-slate-400 mt-1"><span>{pct}% funded</span><span>{owner(c.owner_id)}</span></div>
            </div>
          </Card>);})}
      </div>
      {adding && <AddCampaign org={org} db={db} onClose={()=>setAdding(false)} reload={reload}/>}
    </div>
  );
}
function AddCampaign({org,db,onClose,reload}){

/* ============================ Pipelines ============================ */
function Pipelines({org,db,reload}){
  const [pid,setPid]=useState(db.pipelines[0]?.id);
  const stages=db.stages.filter(s=>s.pipeline_id===pid);
  const move=async(opp,stageId)=>{ await sb.from("opportunities").update({stage_id:stageId}).eq("id",opp.id); reload(); };
  const weighted=stages.reduce((sum,st)=>{const inStage=db.opps.filter(o=>o.stage_id===st.id&&o.status==="open");return sum+inStage.reduce((s,o)=>s+Number(o.amount)*st.probability/100,0);},0);
  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between fade-up"><div><h1 className="text-xl font-bold text-slate-800">Pipelines</h1><p className="text-sm text-slate-500">Weighted forecast: <span className="font-semibold grad-text">{eur(weighted)}</span></p></div><select value={pid} onChange={e=>setPid(e.target.value)} className="border border-slate-300 rounded-lg px-3 py-2 text-sm">{db.pipelines.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
      <div className="flex gap-3 overflow-x-auto pb-3">
        {stages.map(st=>{const opps=db.opps.filter(o=>o.stage_id===st.id);const tot=opps.reduce((s,o)=>s+Number(o.amount),0);return(
          <div key={st.id} className="w-64 shrink-0 fade-up">
            <div className="flex items-center justify-between mb-2 px-1"><div className="flex items-center gap-2"><span className="font-medium text-slate-700 text-sm">{st.name}</span><span className="text-xs text-slate-400">{opps.length}</span></div><span className="text-xs text-slate-400">{st.probability}%</span></div>
            <div className="text-xs text-slate-400 px-1 mb-2">{eur(tot)}</div>
            <div className="space-y-2">
              {opps.map(o=>(<Card key={o.id} hover className="p-3"><div className="text-sm font-medium text-slate-800 leading-snug">{o.name}</div><div className="text-xs text-slate-400 mt-1">{fullName(db.contacts.find(x=>x.id===o.contact_id))}</div><div className="flex items-center justify-between mt-2"><span className="text-sm font-semibold text-emerald-700">{eur(o.amount)}</span>{o.status!=="open"?<Badge className={o.status==="won"?"bg-emerald-100 text-emerald-700":"bg-rose-100 text-rose-700"}>{o.status}</Badge>:<select value={o.stage_id} onChange={e=>move(o,e.target.value)} className="text-xs border border-slate-200 rounded px-1 py-0.5 text-slate-500">{stages.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>}</div></Card>))}
              {!opps.length && <div className="text-xs text-slate-300 text-center py-4 border border-dashed border-slate-200 rounded-lg">Empty</div>}
            </div>
          </div>);})}
      </div>
    </div>
  );
}

        </Card>
      )}
      {adding && <AddTask org={org} db={db} onClose={()=>setAdding(false)} reload={reload}/>}

  );
}

/* ============================ Analytics ============================ */
function Analytics({db}){
  const completed=db.donations.filter(d=>d.status==="completed");
  const raised=completed.reduce((s,d)=>s+Number(d.amount),0);
  const avg=completed.length?raised/completed.length:0;
  // monthly
  const byMonth={}; completed.forEach(d=>{const k=(d.donation_date||"").slice(0,7);byMonth[k]=(byMonth[k]||0)+Number(d.amount);});
  const months=Object.keys(byMonth).sort().map(k=>({k:k.slice(2),v:byMonth[k]}));
  const last=months[months.length-1]?.v||0, prev=months[months.length-2]?.v||0;
  const growth=prev?Math.round((last-prev)/prev*100):0;
  // category
  const catColor={Zakat:"#0F766E",Kurban:"#DC2626",Water:"#2563EB",Sponsorship:"#9333EA",Empowerment:"#F59E0B",General:"#6B7280"};
  const byCat={}; completed.forEach(d=>{const c=db.campaigns.find(x=>x.id===d.campaign_id);const cat=c?c.category:"General";byCat[cat]=(byCat[cat]||0)+Number(d.amount);});
  const cats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({k,v,c:catColor[k]||"#94a3b8"}));
  // methods
  const byMethod={}; completed.forEach(d=>byMethod[d.method]=(byMethod[d.method]||0)+Number(d.amount));
  // recurring vs one
  const rec=completed.filter(d=>d.type==="recurring").reduce((s,d)=>s+Number(d.amount),0);
  const one=completed.filter(d=>d.type==="one_time").reduce((s,d)=>s+Number(d.amount),0);
  // new vs returning donors (by count of gifts per contact)
  const giftCounts={}; completed.forEach(d=>{if(d.contact_id)giftCounts[d.contact_id]=(giftCounts[d.contact_id]||0)+1;});
  const repeat=Object.values(giftCounts).filter(n=>n>1).length, single=Object.values(giftCounts).filter(n=>n===1).length;
  const retention=repeat+single?Math.round(repeat/(repeat+single)*100):0;
  // size distribution
  const buckets=[["< €50",0],["€50–199",0],["€200–999",0],["€1k–9.9k",0],["€10k+",0]];
  completed.forEach(d=>{const a=Number(d.amount);if(a<50)buckets[0][1]++;else if(a<200)buckets[1][1]++;else if(a<1000)buckets[2][1]++;else if(a<10000)buckets[3][1]++;else buckets[4][1]++;});
  const bmax=Math.max(1,...buckets.map(b=>b[1]));
  // top donors
  const byDonor={}; completed.forEach(d=>{if(d.contact_id)byDonor[d.contact_id]=(byDonor[d.contact_id]||0)+Number(d.amount);});
  const top=Object.entries(byDonor).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,v])=>({name:fullName(db.contacts.find(x=>x.id===id)),v}));

  const Kpi=({label,value,delta,up})=> <Card hover className="p-4 fade-up"><div className="text-xs text-slate-500">{label}</div><div className="text-2xl font-bold text-slate-800 mt-1">{value}</div>{delta!=null&&<div className={cls("flex items-center gap-1 text-xs mt-1",up?"text-emerald-600":"text-rose-600")}><Icon d={up?icons.arrowUp:icons.arrowDown} className="w-3 h-3"/>{Math.abs(delta)}% vs last month</div>}</Card>;

  return (
    <div className="space-y-6">
      <h1 className="text-xl font-bold text-slate-800 fade-up">Analytics</h1>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <Kpi label="Total raised" value={eur(raised)} delta={growth} up={growth>=0}/>
        <Kpi label="Average gift" value={eur(avg)}/>
        <Kpi label="Donor retention" value={retention+"%"} />
        <Kpi label="Recurring share" value={(rec+one?Math.round(rec/(rec+one)*100):0)+"%"} />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <Card className="p-5 lg:col-span-2 fade-up"><h2 className="font-semibold text-slate-800 mb-3">Revenue trend</h2><LineChart data={months}/><div className="flex justify-between mt-2 text-[10px] text-slate-400">{months.map(m=><span key={m.k}>{m.k}</span>)}</div></Card>
        <Card className="p-5 fade-up flex flex-col items-center"><h2 className="font-semibold text-slate-800 mb-2 self-start">By category</h2><Donut data={cats}/><div className="mt-3 space-y-1 w-full">{cats.map(c=><div key={c.k} className="flex items-center gap-2 text-xs"><span className="w-2.5 h-2.5 rounded-full" style={{background:c.c}}></span><span className="flex-1 text-slate-600">{c.k}</span><span className="text-slate-500">{eur(c.v)}</span></div>)}</div></Card>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <Card className="p-5 fade-up"><h2 className="font-semibold text-slate-800 mb-4">Gift size distribution</h2><div className="space-y-3">{buckets.map(([k,v])=><div key={k}><div className="flex justify-between text-sm mb-1"><span className="text-slate-600">{k}</span><span className="text-slate-500">{v}</span></div><div className="h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full rounded-full bar-grow bg-gradient-to-r from-teal-500 to-emerald-500" style={{width:`${v/bmax*100}%`}}></div></div></div>)}</div></Card>
        <Card className="p-5 fade-up"><h2 className="font-semibold text-slate-800 mb-4">Top donors</h2><div className="space-y-3">{top.map((t,i)=><div key={i} className="flex items-center gap-3"><span className="text-slate-400 text-sm w-4">{i+1}</span><Avatar name={t.name}/><span className="flex-1 text-sm text-slate-700 truncate">{t.name}</span><span className="font-semibold text-slate-800">{eur(t.v)}</span></div>)}</div></Card>
        <Card className="p-5 fade-up"><h2 className="font-semibold text-slate-800 mb-4">New vs returning</h2><div className="flex items-center gap-6"><div className="flex-1"><div className="text-xs text-slate-500">Returning</div><div className="text-2xl font-bold text-emerald-700">{repeat}</div></div><div className="flex-1"><div className="text-xs text-slate-500">One-time</div><div className="text-2xl font-bold text-sky-600">{single}</div></div></div><div className="h-3 bg-slate-100 rounded-full overflow-hidden mt-4 flex"><div className="h-full bg-emerald-600 bar-grow" style={{width:`${repeat/(repeat+single||1)*100}%`}}></div><div className="h-full bg-sky-500" style={{width:`${single/(repeat+single||1)*100}%`}}></div></div><div className="mt-4 pt-3 border-t border-slate-100 text-sm text-slate-500">{completed.filter(d=>d.covers_fees).length} of {completed.length} gifts covered fees (100% policy)</div></Card>
      </div>
    </div>
  );
}

  return (
    <div className="space-y-6 max-w-3xl">
      <h1 className="text-xl font-bold text-slate-800 fade-up">Settings</h1>
      <Card className="p-5 fade-up"><div className="flex items-center gap-3 mb-4"><NoonMark size={40}/><div><h2 className="font-semibold text-slate-800">Organization (white-label tenant)</h2><p className="text-xs text-slate-400">Each org is an isolated tenant — the basis for selling NoonOS to other charities.</p></div></div>
        <div className="grid grid-cols-2 gap-4 text-sm">
          <div><div className="text-xs text-slate-500">Name</div><div className="text-slate-800">{org.name}</div></div>
          <div><div className="text-xs text-slate-500">Slug / tenant</div><div className="text-slate-800">{org.slug}</div></div>
          <div><div className="text-xs text-slate-500">Currency</div><div className="text-slate-800">{org.currency}</div></div>
          <div><div className="text-xs text-slate-500">Plan</div><div className="text-slate-800 capitalize">{org.plan}</div></div>
          <div><div className="text-xs text-slate-500">Brand color</div><div className="flex items-center gap-2"><span className="w-5 h-5 rounded" style={{background:org.primary_color}}></span>{org.primary_color}</div></div>
        </div>
      </Card>
      <Card className="p-5 fade-up"><div className="flex items-center justify-between mb-3"><h2 className="font-semibold text-slate-800">Custom fields</h2><button onClick={()=>setAdding(true)} className="text-sm text-emerald-700 hover:underline">+ Add field</button></div>
        <div className="space-y-2">{db.cfDefs.map(f=><div key={f.id} className="flex items-center justify-between text-sm border border-slate-100 rounded-lg px-3 py-2"><div><span className="font-medium text-slate-700">{f.label}</span> <span className="text-xs text-slate-400">on {f.entity}</span></div><div className="flex items-center gap-2"><Badge className="bg-slate-100 text-slate-500">{f.type}</Badge>{f.options?.length>0&&<span className="text-xs text-slate-400">{f.options.join(", ")}</span>}</div></div>)}{!db.cfDefs.length&&<p className="text-sm text-slate-400">No custom fields yet.</p>}</div>
      </Card>
      <Card className="p-5 fade-up"><h2 className="font-semibold text-slate-800 mb-3">Team members</h2><div className="space-y-2">{db.members.map(m=><div key={m.id} className="flex items-center justify-between"><div className="flex items-center gap-2.5"><Avatar name={m.full_name}/><div><div className="text-sm font-medium text-slate-800">{m.full_name}</div><div className="text-xs text-slate-400">{m.title} · {m.email}</div></div></div><Badge className="bg-slate-100 text-slate-600 capitalize">{m.role}</Badge></div>)}</div></Card>
      <Card className="p-5 fade-up"><h2 className="font-semibold text-slate-800 mb-2">Integrations & API</h2><p className="text-sm text-slate-500 mb-3">NoonOS exposes a REST + realtime API. Connect payments, email and accounting, or sync to an external CRM.</p><div className="grid grid-cols-2 sm:grid-cols-3 gap-2">{["Stripe","PayPal","Twingle","Mailchimp","DATEV","HubSpot","Salesforce NPSP","WhatsApp Business","Zapier"].map(x=><div key={x} className="border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-600 flex items-center justify-between lift transition hover:border-emerald-300">{x}<span className="text-xs text-slate-300">connect</span></div>)}</div></Card>
      {adding && <AddField org={org} onClose={()=>setAdding(false)} reload={reload}/>}
    </div>
  );
}
function AddField({org,onClose,reload}){
  const [f,setF]=useState({entity:"contact",label:"",type:"text",options:""});
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const save=async()=>{ const key=f.label.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,""); await sb.from("custom_field_defs").insert({org_id:org.id,entity:f.entity,key,label:f.label,type:f.type,options:f.type==="select"&&f.options?f.options.split(",").map(x=>x.trim()).filter(Boolean):[]}); onClose(); reload(); };
  return <Modal title="Add custom field" onClose={onClose}>
    <div className="grid grid-cols-2 gap-3"><Field label="Applies to"><select value={f.entity} onChange={e=>set("entity",e.target.value)} className={inputCls}><option value="contact">Contact</option><option value="task">Task</option><option value="campaign">Campaign</option></select></Field><Field label="Type"><select value={f.type} onChange={e=>set("type",e.target.value)} className={inputCls}><option value="text">Text</option><option value="number">Number</option><option value="select">Select</option><option value="date">Date</option><option value="boolean">Yes/No</option></select></Field></div>
    <Field label="Label"><input className={inputCls} value={f.label} onChange={e=>set("label",e.target.value)} placeholder="e.g. Gift Aid status"/></Field>
    {f.type==="select" && <Field label="Options (comma separated)"><input className={inputCls} value={f.options} onChange={e=>set("options",e.target.value)} placeholder="Eligible, Not eligible, Unknown"/></Field>}
    <div className="flex justify-end gap-2 mt-2"><button onClick={onClose} className="px-4 py-2 text-sm text-slate-600">Cancel</button><button onClick={save} className="btn-grad text-white px-4 py-2 text-sm rounded-lg">Add field</button></div>
  </Modal>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
