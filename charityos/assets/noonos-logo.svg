<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" role="img" aria-label="NoonOS — Charity Management Platform">
  <defs>
    <linearGradient id="noonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="noonShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0F766E" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Badge with Noon (ن) mark: a bowl + dot -->
  <g filter="url(#noonShadow)">
    <rect x="12" y="15" width="80" height="80" rx="22" fill="url(#noonGrad)"/>
  </g>
  <!-- bowl (body of the letter Noon) -->
  <path d="M36 46 C 36 74, 68 74, 68 46" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
  <!-- the diacritic dot, in gold accent -->
  <circle cx="52" cy="34" r="6.2" fill="#FBBF24"/>

  <!-- Wordmark -->
  <text x="112" y="58" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="800" letter-spacing="-0.5">
    <tspan fill="#0F172A">Noon</tspan><tspan fill="#0F766E">OS</tspan>
  </text>
  <text x="113" y="80" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="0.5" fill="#64748B">Charity Management Platform</text>
</svg>
